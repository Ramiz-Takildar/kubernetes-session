apiVersion: v1
kind: Pod
metadata:
  name: nginx-pvc-pod
spec:
  initContainers:
  - name: init-html
    image: busybox:1.36
    command: ['sh', '-c', 'echo "<h1>Hello from Persistent Storage!</h1>" > /usr/share/nginx/html/index.html']
    volumeMounts:
    - mountPath: /usr/share/nginx/html
      name: nginx-storage
  containers:
  - name: nginx
    image: nginx:stable-alpine
    ports:
    - containerPort: 80
    volumeMounts:
    - mountPath: /usr/share/nginx/html
      name: nginx-storage
  volumes:
  - name: nginx-storage
    persistentVolumeClaim:
      claimName: my-pvc
