apiVersion: v1
kind: Namespace
metadata:
  name: gateway-demo
---
apiVersion: v1
kind: Pod
metadata:
  name: backend-pod
  namespace: gateway-demo
  labels:
    app: backend
spec:
  containers:
  - name: nginx
    image: nginx:stable-alpine
    ports:
    - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: gateway-demo
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 80