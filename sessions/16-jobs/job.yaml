apiVersion: batch/v1
kind: Job
metadata:
  name: countdown
spec:
  completions: 3
  parallelism: 1
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: counter
        image: busybox:1.36
        command: ['sh', '-c', 'for i in 3 2 1; do echo $i; sleep 1; done']