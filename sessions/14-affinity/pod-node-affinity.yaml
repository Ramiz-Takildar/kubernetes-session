apiVersion: v1
kind: Pod
metadata:
  name: affinity-demo
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: training-node
            operator: In
            values:
            - "true"
  containers:
  - name: nginx
    image: nginx:stable-alpine
    ports:
    - containerPort: 80